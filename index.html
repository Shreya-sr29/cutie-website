<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>For My Cutie ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
    position:relative;
}

/* Main Box */
.container{
    text-align:center;
    z-index:10;
}

h1{
    font-size:60px;
    color:white;
    margin-bottom:10px;
    text-shadow:0 0 15px rgba(255,255,255,0.7);
}

h2{
    font-size:42px;
    color:white;
    margin-bottom:35px;
    text-shadow:0 0 12px rgba(255,255,255,0.7);
}

/* Buttons */
.buttons{
    position:relative;
    width:400px;
    height:220px;
    margin:auto;
}

button{
    position:absolute;
    border:none;
    padding:16px 38px;
    border-radius:16px;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#ff4f9a;
    color:white;
    left:70px;
    top:80px;
    box-shadow:0 0 20px rgba(255,0,100,0.5);
}

#noBtn{
    background:white;
    color:#ff4f9a;
    position: fixed;
    left:60px;
    top:50px;
    box-shadow:0 0 20px rgba(255,255,255,0.5);
}

button:hover{
    transform:scale(1.1);
}

/* Popup */
.popup{
    position:absolute;
    top:60px;
    left:-300px;
    background:#ff4d6d;
    color:white;
    padding:18px 35px;
    border-radius:18px;
    font-size:32px;
    font-weight:bold;
    box-shadow:0 0 25px rgba(255,0,80,0.5);
    transition:1s;
    z-index:100;
}

/* Hearts */
.heart{
    position:absolute;
    color:#ff4f9a;
    font-size:22px;
    animation:float 6s linear infinite;
    opacity:0.8;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
    }
    100%{
        transform:translateY(-120px) scale(1.5);
    }
}

</style>
</head>
<body>
    <!-- SONG -->
<audio id="bgMusic" autoplay loop>
    <source src="./lover.mp3" type="audio/mp3">
</audio>

<!-- Moving Popup -->
<div class="popup" id="popup">
    Single rehna hai kya 😜
</div>

<div class="container">

    <h1>Aman ❤️</h1>
    <h2>Will uhh be my cutie pie? 🥺💖</h2>

    <div class="buttons">

        <button id="yesBtn">Yes 💘</button>

        <button id="noBtn">No 😭</button>

    </div>

</div>

<script>
    /* ---------- MUSIC PLAY ---------- */

const music = document.getElementById("bgMusic");

/* First click pe music start */
document.body.addEventListener("click", () => {

    music.play()
    .then(() => {
        console.log("Music Playing ❤️");
    })
    .catch((error) => {
        console.log("Autoplay blocked:", error);
    });

}, { once: true });



/* ---------------- POPUP MOVING ---------------- */

const popup = document.getElementById("popup");

function showPopup(){

    const maxX = window.innerWidth - 350;
    const maxY = window.innerHeight - 150;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    popup.style.left = randomX + "px";
    popup.style.top = randomY + "px";

    popup.style.opacity = "1";

    setTimeout(() => {
        popup.style.opacity = "0";
    }, 2500);
}

/* Show popup every 5 sec */
setInterval(showPopup, 5000);


/* ---------------- NO BUTTON DYNAMIC ---------------- */
/* ---------------- NO BUTTON DYNAMIC ---------------- */

const noBtn = document.getElementById("noBtn");

function moveNoButton() {

    // S
    const padding = 20;

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    // RANDOM POSITION
    const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
    const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

    // FIX POSITION
    noBtn.style.position = "fixed";

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

/* Hover pe move karega */
noBtn.addEventListener("mouseover", moveNoButton);

/* Mobile touch */
noBtn.addEventListener("touchstart", moveNoButton);

/* Har 2 sec baad khud bhi random place pe dikhega */
setInterval(moveNoButton, 2000);



/* ---------------- YES BUTTON ---------------- */

document.getElementById("yesBtn").addEventListener("click", () => {

    document.body.innerHTML = `
    
    <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:linear-gradient(135deg,#ff5fa2,#ffc4dd);
        color:white;
        text-align:center;
        overflow:hidden;
    ">

        <h1 style="
            font-size:80px;
            margin-bottom:20px;
            animation:pop 1s infinite alternate;
        ">
            Yayyyy 💖
        </h1>

        <h2 style="
            font-size:45px;
        ">
            Now you're mine 😭✨
        </h2>

    </div>

    <style>
        @keyframes pop{
            from{
                transform:scale(1);
            }
            to{
                transform:scale(1.1);
            }
        }
    </style>

    `;
});


/* ---------------- FLOATING HEARTS ---------------- */

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "💖";

    heart.style.left = Math.random() * window.innerWidth + "px";

    heart.style.fontSize = (Math.random() * 25 + 15) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 250);

</script>

</body>
</html>
